name: Flutter Build Multi-Platform Universal Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build for ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          # 核心修正：在命令末尾显式指定主程序入口 -t lib/main.dart
          - { name: Android, os: ubuntu-latest, command: flutter build apk --release --split-per-abi -t lib/main.dart }
          - { name: Windows, os: windows-latest, command: flutter build windows --release -t lib/main.dart }
          - { name: macOS,   os: macos-latest,   command: flutter config --enable-macos-desktop && flutter build macos --release -t lib/main.dart }
          - { name: Linux,   os: ubuntu-latest,  command: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libblkid-dev liblzma-dev && flutter build linux --release -t lib/main.dart }
          - { name: Web,     os: ubuntu-latest,  command: flutter build web --release -t lib/main.dart }
          - { name: iOS,     os: macos-latest,   command: flutter build ios --release --no-codesign -t lib/main.dart }

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: 'any'

      # 核心修正：使用递归获取依赖，并强制修复 Monorepo 引起的平台文件夹缺失
      - name: Install dependencies
        run: |
          flutter pub get
          flutter pub get --recursive
          flutter create . --platforms=android,ios,linux,macos,windows,web

      - name: Sync Tag Version to Project
        shell: bash
        run: |
          TAG_NAME="${{ github.ref_name }}"
          VERSION_NAME=$(echo $TAG_NAME | sed 's/^v//')
          if [[ "$TAG_NAME" == "master" || "$TAG_NAME" == "main" ]]; then
            VERSION_NAME="1.0.0"
          fi
          VERSION_FULL="${VERSION_NAME}+${{ github.run_number }}"
          perl -i -pe "s/^version: .*/version: $VERSION_FULL/" pubspec.yaml
          echo "Final Project Version set to: $VERSION_FULL"

      - name: Execute Build
        run: ${{ matrix.platform.command }}

      - name: Install Zip on Windows
        if: matrix.platform.name == 'Windows'
        run: choco install zip -y

      - name: Prepare Artifacts
        shell: bash
        run: |
          mkdir -p output
          PROJECT_NAME=$(grep '^name:' pubspec.yaml | cut -d' ' -f2 | tr -d '\r')
          
          case "${{ matrix.platform.name }}" in
            Android)
              cp build/app/outputs/flutter-apk/*-arm64-v8a-release.apk output/app-android-arm64.apk || true
              cp build/app/outputs/flutter-apk/*-armeabi-v7a-release.apk output/app-android-armv7.apk || true
              cp build/app/outputs/flutter-apk/*-x86_64-release.apk output/app-android-x86_64.apk || true
              ;;
            Windows)
              cd build/windows/x64/runner/Release && zip -r ../../../../../output/app-windows-portable.zip *
              ;;
            macOS)
              cd build/macos/Build/Products/Release && zip -r ../../../../../output/app-macos-universal.zip *.app
              ;;
            Linux)
              cd build/linux/x64/release/bundle && zip -r ../../../../../output/app-linux.zip *
              ;;
            Web)
              cd build/web && zip -r ../../output/app-web.zip *
              ;;
            iOS)
              cd build/ios/iphoneos && zip -r ../../../output/app-ios-debug-only.zip Runner.app || true
              ;;
          esac

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          files: output/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
